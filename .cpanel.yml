---
# ==========================================================================
#  cPanel Git Version Control - Deployment otomatis
#
#  Task di bawah dijalankan otomatis oleh cPanel setiap kali ada push ke
#  repository (atau saat menekan "Deploy HEAD Commit" / "Update from Remote").
#  Working directory task ini = folder repository = public_html.
#
#  PENTING soal versi PHP:
#  Pastikan MultiPHP Manager di cPanel mengarah ke PHP 8.3+ untuk domain ini,
#  sehingga perintah `php` dan `composer` di bawah memakai PHP yang benar.
#  Jika `php` default masih versi lama, ganti setiap `php` dan `composer`
#  di bawah dengan path eksplisit, contoh:
#     /opt/cpanel/ea-php83/root/usr/bin/php /opt/cpanel/composer/bin/composer install ...
#     /opt/cpanel/ea-php83/root/usr/bin/php artisan migrate --force
# ==========================================================================
deployment:
  tasks:
    - export DEPLOYPATH=$PWD
    - /bin/echo "==> Deploy dimulai di $DEPLOYPATH"

    # 1. Dependensi PHP (produksi: tanpa dev, autoloader dioptimasi).
    - /bin/echo "==> [1/4] composer install"
    - composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

    # 2. Build asset frontend (Vite + Tailwind) menghasilkan public/build.
    - /bin/echo "==> [2/4] build assets (npm)"
    - npm ci --no-audit --no-fund
    - npm run build

    # 3. Database: jalankan migrasi (aman diulang, hanya migrasi baru yang jalan).
    - /bin/echo "==> [3/4] artisan migrate"
    - php artisan migrate --force

    # 4. Optimasi cache Laravel + symlink storage publik.
    - /bin/echo "==> [4/4] optimize & storage:link"
    - php artisan storage:link || /bin/true
    - php artisan config:clear
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache

    - /bin/echo "==> Deploy selesai."
