name: Deploy to Hostinger (daily.konekin.space)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  SSH_HOST: "153.92.9.176"
  SSH_PORT: "65002"
  SSH_USER: "u385356168"
  REMOTE_PATH: "domains/daily.konekin.space/public_html"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.production.example' \
            --exclude='storage/app' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"

      - name: Post-deploy (migrate, cache, storage link, permissions)
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" '
            set -e
            cd '"$REMOTE_PATH"'
            mkdir -p storage/app/public storage/app/private storage/framework/cache/data \
                     storage/framework/sessions storage/framework/testing storage/framework/views storage/logs
            chmod -R 775 storage bootstrap/cache
            php artisan storage:link || true
            php artisan migrate --force
            php artisan config:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          '
